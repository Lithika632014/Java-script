<!DOCTYPE html>
<html>
<head>
<title>My Zoo</title>
    <style>
        
        body {
            font-family: Arial, sns-serif;
            background: rgb(195, 227, 255);
            text-align: center;
            padding: 30px;
          }

          h1 {
            color: #f529a7
          }

          #zoo {
            border: 2px solid #f48484;
            width: 300px;
            margin: 16px auto;
            padding: 12px;
            border-radius: 10px;
            background: white;
          }

          .zone {
            border: 1px solid #f48484;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
          }
    </style>

</head>
<body>

    <h1>My Zoo</h1>
    <P>Use JavaScript and the DOM to add animals to each cage!</p>

    <div id="zoo">
        <div class="zone">Zone 1: <span id="zone1"></span></div>
        <div class="zone">Zone 2: <span id="zone2"></span></div>
        <div class="zone">Zone 3: <span id="zone3"></span></div>
        <div class="zone">Total Animals: <span id="total"></span></div>
    </div>

    <br>

    <button onclick="openZoo()">Open the Zoo!</button>

    <p id="zoo-status"></p>

    <script>

        function openZoo() {
  
        /* Task 1: Add your first animal to Zone 1 */
        document.getElementById("zone1").innerHTML = "Lion";

         /* Task 2: Add your first animal to Zone 2 */
        document.getElementById("zone2").innerHTML = "Elephant";

         
        document.getElementById("zone3").innerHTML = "Penguin";
        
        
        document.getElementById("total").innerHTML = "3";


        document.getElementById("zoo").style.backgroundColor = "lightred";

        document.getElementById("zoo-status").innerHTML = document.title + " is now open!";

        
        }
    </script>
</body>
</html>
