<!DOCTYPE html>
<html>
<body>
<h2>Java Script For Loop</h2>
<script>
    var fruits = ["Apple", "Mango", "Grapes",
    "Wtermelon","Jack Fruit", "Banana"];
    var text = "";
    var i;
    for (i = 0; i < fruits.length; i++) {
    text += fruits[i] + "<br>";
    }
    document.getElementById("demo").innerHTML= text;
    </script>
</body>
</html>
