<!DOCTYPE html>
<html>
<body>
<h2>JavaScript Array Methods</h2>
<h2>join() and pop()</h2>
<p>The join( )method joins array elements into astring and pop() methos removes the last element from an array.</p>
<p id="myjoin"></p>
<p id="myfirstpop"></p>
<p id="mysecondpop"></p>
<script>
var fruits = ["Strawberry", "Dragonfruit", "Starfruit", "Blackberry"];
document.getElementById("myjoin").innerHTML = fruits.join(" * ");
document.getElementById("myfirstpop").innerHTML = fruits;
fruits.pop();
document.getElementById("mysecondpop").innerHTML = fruits;
</script>
</body>
</html>
